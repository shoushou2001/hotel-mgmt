<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title th:text="${guest.id} == null ? 'Add Guest' : 'Edit Guest'">Guest Form</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
  <div class="container">
    <a class="navbar-brand" href="/">HotelMgmt</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="/">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="/rooms">Rooms</a></li>
        <li class="nav-item"><a class="nav-link active" href="/guests">Guests</a></li>
        <li class="nav-item"><a class="nav-link" href="/bookings">Bookings</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-4">
  <h2 th:text="${guest.id} == null ? 'Register New Guest' : 'Edit Guest'"></h2>
  <div th:if="${dupError}" class="alert alert-danger" th:text="${dupError}"></div>

  <div class="card shadow-sm">
    <div class="card-body">
      <form th:action="@{/guests/save}" th:object="${guest}" method="post">
        <input type="hidden" th:field="*{id}">

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">First Name</label>
            <input type="text" class="form-control" th:field="*{firstName}" required>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Last Name</label>
            <input type="text" class="form-control" th:field="*{lastName}" required>
          </div>
        </div>
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" th:field="*{email}" required>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Phone</label>
            <input type="text" class="form-control" th:field="*{phone}" required>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Address</label>
          <input type="text" class="form-control" th:field="*{address}">
        </div>
        <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Save</button>
        <a href="/guests" class="btn btn-secondary">Cancel</a>
      </form>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
