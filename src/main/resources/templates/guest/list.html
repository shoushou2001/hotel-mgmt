<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Guests - Hotel Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/"><i class="bi bi-building"></i> HotelMgmt</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="/">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="/rooms">Rooms</a></li>
        <li class="nav-item"><a class="nav-link active" href="/guests">Guests</a></li>
        <li class="nav-item"><a class="nav-link" href="/bookings">Bookings</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-people"></i> Guests</h2>
    <a href="/guests/new" class="btn btn-primary"><i class="bi bi-person-plus"></i> Add Guest</a>
  </div>

  <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
    <span th:text="${success}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
    <span th:text="${error}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <div class="row mb-3">
    <div class="col-md-6">
      <form th:action="@{/guests}" method="get" class="input-group">
        <input type="text" name="search" class="form-control" placeholder="Search by name..." th:value="${search}">
        <button class="btn btn-outline-secondary" type="submit"><i class="bi bi-search"></i></button>
      </form>
    </div>
  </div>

  <div class="card shadow-sm">
    <div class="card-body p-0">
      <table class="table table-hover mb-0">
        <thead class="table-dark">
          <tr><th>Name</th><th>Email</th><th>Phone</th><th>Address</th><th class="text-end">Actions</th></tr>
        </thead>
        <tbody>
          <tr th:each="g : ${guests}">
            <td class="fw-bold" th:text="${g.fullName}"></td>
            <td th:text="${g.email}"></td>
            <td th:text="${g.phone}"></td>
            <td th:text="${g.address}"></td>
            <td class="text-end">
              <a th:href="@{/guests/{id}/edit(id=${g.id})}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-pencil"></i></a>
              <a th:href="@{/guests/{id}/delete(id=${g.id})}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Delete this guest?')"><i class="bi bi-trash"></i></a>
            </td>
          </tr>
          <tr th:if="${guests.isEmpty()}">
            <td colspan="5" class="text-center text-muted py-4">No guests found.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
