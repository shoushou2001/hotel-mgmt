<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title th:text="${room.id} == null ? 'Add Room' : 'Edit Room'">Room Form</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
  <div class="container">
    <a class="navbar-brand" href="/">HotelMgmt</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="/">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link active" href="/rooms">Rooms</a></li>
        <li class="nav-item"><a class="nav-link" href="/guests">Guests</a></li>
        <li class="nav-item"><a class="nav-link" href="/bookings">Bookings</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-4">
  <h2 th:text="${room.id} == null ? 'Add New Room' : 'Edit Room'"></h2>
  <div th:if="${dupError}" class="alert alert-danger" th:text="${dupError}"></div>

  <div class="card shadow-sm">
    <div class="card-body">
      <form th:action="@{/rooms/save}" th:object="${room}" method="post">
        <input type="hidden" th:field="*{id}">

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Room Number</label>
            <input type="text" class="form-control" th:field="*{roomNumber}" required>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Status</label>
            <select class="form-select" th:field="*{status}">
              <option value="AVAILABLE">Available</option>
              <option value="OCCUPIED">Occupied</option>
              <option value="MAINTENANCE">Maintenance</option>
            </select>
          </div>
        </div>

        <div class="row">
          <div class="col-md-4 mb-3">
            <label class="form-label">Type</label>
            <select class="form-select" th:field="*{type}">
              <option th:each="t : ${types}" th:value="${t}" th:text="${t}"></option>
            </select>
          </div>
          <div class="col-md-4 mb-3">
            <label class="form-label">Capacity</label>
            <input type="number" class="form-control" th:field="*{capacity}" min="1" required>
          </div>
          <div class="col-md-4 mb-3">
            <label class="form-label">Price Per Night ($)</label>
            <input type="number" class="form-control" th:field="*{pricePerNight}" min="0" step="0.01" required>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Description</label>
          <textarea class="form-control" th:field="*{description}" rows="3"></textarea>
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Save</button>
          <a href="/rooms" class="btn btn-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
