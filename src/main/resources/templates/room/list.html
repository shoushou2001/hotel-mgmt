<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rooms - Hotel Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/"><i class="bi bi-building"></i> HotelMgmt</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="/">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link active" href="/rooms">Rooms</a></li>
        <li class="nav-item"><a class="nav-link" href="/guests">Guests</a></li>
        <li class="nav-item"><a class="nav-link" href="/bookings">Bookings</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-door-open"></i> Rooms</h2>
    <a href="/rooms/new" class="btn btn-primary"><i class="bi bi-plus-circle"></i> Add Room</a>
  </div>

  <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
    <span th:text="${success}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
    <span th:text="${error}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <div class="card shadow-sm">
    <div class="card-body p-0">
      <table class="table table-hover mb-0">
        <thead class="table-dark">
          <tr>
            <th>Room #</th>
            <th>Type</th>
            <th>Capacity</th>
            <th>Price/Night</th>
            <th>Status</th>
            <th class="text-end">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="room : ${rooms}">
            <td class="fw-bold" th:text="${room.roomNumber}"></td>
            <td th:text="${room.type}"></td>
            <td th:text="${room.capacity}"></td>
            <td>$<span th:text="${room.pricePerNight}"></span></td>
            <td>
              <span class="badge"
                th:classappend="${room.status == 'AVAILABLE'} ? 'bg-success' : (${room.status == 'OCCUPIED'} ? 'bg-warning text-dark' : 'bg-secondary')"
                th:text="${room.status}"></span>
            </td>
            <td class="text-end">
              <a th:href="@{/rooms/{id}/edit(id=${room.id})}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-pencil"></i></a>
              <a th:href="@{/rooms/{id}/delete(id=${room.id})}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Delete this room?')"><i class="bi bi-trash"></i></a>
            </td>
          </tr>
          <tr th:if="${rooms.isEmpty()}">
            <td colspan="6" class="text-center text-muted py-4">No rooms found. <a href="/rooms/new">Add one</a></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
