<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bookings - Hotel Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/"><i class="bi bi-building"></i> HotelMgmt</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="/">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="/rooms">Rooms</a></li>
        <li class="nav-item"><a class="nav-link" href="/guests">Guests</a></li>
        <li class="nav-item"><a class="nav-link active" href="/bookings">Bookings</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-calendar-check"></i> Bookings</h2>
    <a href="/bookings/new" class="btn btn-primary"><i class="bi bi-calendar-plus"></i> New Booking</a>
  </div>

  <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
    <span th:text="${success}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
    <span th:text="${error}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <div class="card shadow-sm">
    <div class="card-body p-0">
      <table class="table table-hover mb-0">
        <thead class="table-dark">
          <tr>
            <th>ID</th><th>Guest</th><th>Room</th><th>Check-In</th><th>Check-Out</th><th>Status</th>
            <th class="text-end">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="b : ${bookings}">
            <td class="fw-bold" th:text="${b.id}"></td>
            <td th:text="${b.guest.fullName}"></td>
            <td th:text="${b.room.roomNumber}"></td>
            <td th:text="${b.checkIn}"></td>
            <td th:text="${b.checkOut}"></td>
            <td>
              <span class="badge"
                th:classappend="${b.status == 'CONFIRMED'} ? 'bg-primary' : (${b.status == 'CHECKED_IN'} ? 'bg-warning text-dark' : (${b.status == 'CHECKED_OUT'} ? 'bg-success' : 'bg-danger'))"
                th:text="${b.status}"></span>
            </td>
            <td class="text-end">
              <div class="btn-group btn-group-sm">
                <a th:if="${b.status == 'CONFIRMED'}" th:href="@{/bookings/{id}/checkin(id=${b.id})}" class="btn btn-outline-warning">Check-In</a>
                <a th:if="${b.status == 'CHECKED_IN'}" th:href="@{/bookings/{id}/checkout(id=${b.id})}" class="btn btn-outline-success">Check-Out</a>
                <a th:if="${b.status == 'CONFIRMED'}" th:href="@{/bookings/{id}/cancel(id=${b.id})}" class="btn btn-outline-danger" onclick="return confirm('Cancel this booking?')">Cancel</a>
                <a th:href="@{/bookings/{id}/delete(id=${b.id})}" class="btn btn-outline-dark" onclick="return confirm('Delete this booking?')"><i class="bi bi-trash"></i></a>
              </div>
            </td>
          </tr>
          <tr th:if="${bookings.isEmpty()}">
            <td colspan="7" class="text-center text-muted py-4">No bookings found.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
